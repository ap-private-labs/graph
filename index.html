<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Tabbed citation knowledge graphs for influential AI research areas.">
    <title>AI Works Knowledge Graph</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">AI Works Knowledge Graph</p>
        <h1>Prominent AI Research Lineages</h1>
      </div>
      <a class="repo-link" href="https://github.com/ap-private-labs/graph">GitHub</a>
    </header>

    <main class="app-shell">
      <nav id="topic-tabs" class="topic-tabs" aria-label="Research topics"></nav>

      <section class="graph-shell" aria-label="Knowledge graph">
        <div class="graph-header">
          <div>
            <h2 id="graph-title"></h2>
            <p id="graph-summary"></p>
            <p id="graph-meta" class="graph-meta"></p>
          </div>
          <div class="zoom-controls" aria-label="Zoom controls">
            <button id="zoom-out" type="button" aria-label="Zoom out">-</button>
            <button id="zoom-reset" type="button">Reset</button>
            <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
          </div>
        </div>

        <div class="graph-stage">
          <svg id="graph" role="img" aria-label="Zoomable citation graph"></svg>
          <aside class="detail-panel" aria-live="polite" aria-label="Selected paper">
            <div id="paper-detail"></div>
          </aside>
        </div>

        <div id="legend" class="legend" aria-label="Area legend"></div>
      </section>
    </main>

    <script src="data/papers.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
